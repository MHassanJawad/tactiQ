name: rt-fsas
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # PyTorch CPU-only
  - pytorch=2.2
  - cpuonly

  - pip:
    # Graph Neural Networks
    - torch-geometric==2.5.3
    - torch-scatter
    - torch-sparse
    - torch-cluster

    # Vector similarity search
    - faiss-cpu==1.8.0

    # Google Gemini API
    - google-generativeai>=0.7.0

    # StatsBomb data loader
    - statsbombpy

    # Core data science
    - pandas>=2.0
    - numpy<2
    - scikit-learn>=1.4
    - scipy

    # Visualization
    - matplotlib>=3.8
    - seaborn>=0.13
    - plotly>=5.20
    - umap-learn

    # Dashboard
    - dash>=2.16
    - dash-bootstrap-components

    # Notebooks
    - jupyter
    - ipykernel
    - ipywidgets

    # Utilities
    - tqdm
    - joblib
    - ijson>=3.2
